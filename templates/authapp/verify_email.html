{% extends "base.html" %}

{% block title %}Verificación de Correo - Hotel{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body text-center p-5">
                <h2 class="card-title mb-4">Verificación de Correo</h2>

                <div class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor"
                         class="bi bi-exclamation-triangle text-warning" viewBox="0 0 16 16">
                        <path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1
                            .063.016.15.15 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.2.2
                            0 0 1-.054.06.1.1 0 0 1-.066.017H1.146a.1.1 0 0
                            1-.066-.017.2.2 0 0 1-.054-.06.18.18 0 0 1
                            .002-.183L7.884 2.073a.15.15 0 0 1 .054-.057m1.044-.45a1.13 1.13 0 0
                            0-1.96 0L.165 13.233c-.457.778.091 1.767.98
                            1.767h13.713c.889 0 1.438-.99.98-1.767z"/>
                        <path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0M7.1 5.995a.905.905 0 1 1
                            1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z"/>
                    </svg>
                </div>

                <p class="text-muted mb-4">
                    No fue posible verificar tu cuenta. El enlace puede ser inválido,
                    haber expirado o ya haber sido utilizado.
                </p>

                <a href="{% url 'login' %}" class="btn btn-primary me-2">
                    Iniciar sesión
                </a>
                <a href="{% url 'register' %}" class="btn btn-outline-secondary">
                    Volver al registro
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
