{% extends "base.html" %}

{% block title %}Correo enviado - Áurea{% endblock %}

{% block content %}
<style>
    .hotel-navbar-luxury, .hotel-footer-luxury { display:none !important; }
    .confirm-wrapper { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; background:linear-gradient(160deg,#f8f5f0,#f0ebe3); }
    .confirm-card { background:#fff; border-radius:1.5rem; box-shadow:0 4px 24px rgba(0,0,0,.06); border:1px solid #f0ebe3; max-width:450px; width:100%; padding:3rem 2.5rem; text-align:center; }
    .confirm-card .icon-circle { width:72px; height:72px; border-radius:50%; background:rgba(22,163,74,.08); display:inline-flex; align-items:center; justify-content:center; margin-bottom:1.25rem; }
    .confirm-card .icon-circle i { font-size:2rem; color:#16a34a; }
    .confirm-card h2 { font-family:'Playfair Display',serif; font-weight:700; font-size:1.5rem; color:#1a1a1a; }
    .confirm-card p { color:#999; font-size:.9rem; }
    @media(max-width:576px) { .confirm-card { padding:2rem 1.5rem; } .confirm-card h2 { font-size:1.3rem; } }
</style>

<div class="confirm-wrapper">
    <div class="confirm-card fade-in-up">
        <div class="icon-circle"><i class="bi bi-envelope-check"></i></div>
        <h2>¡Cuenta creada!</h2>
        <p>Tu cuenta fue creada exitosamente. Revisa tu correo electrónico para verificarla.</p>
        <hr style="border-color:#f0ebe3;">
        <p class="mb-0" style="font-size:.85rem;">
            ¿Ya verificaste tu cuenta? <a href="{% url 'login' %}" style="color:#b8860b; font-weight:600; text-decoration:none;">Inicia sesión</a>
        </p>
    </div>
</div>
{% endblock %}
