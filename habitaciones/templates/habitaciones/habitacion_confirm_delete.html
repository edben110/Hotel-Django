{% extends "base.html" %}

{% block title %}Eliminar Habitación{% endblock %}

{% block content %}
<h1>Eliminar Habitación</h1>

<div class="card border-danger">
    <div class="card-body">
        <p class="text-danger">
            <i class="bi bi-exclamation-triangle"></i>
            ¿Estás seguro de que deseas eliminar la <strong>{{ habitacion }}</strong>?
        </p>
        <p>Esta acción no se puede deshacer.</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i> Sí, eliminar
                </button>
                <a href="{% url 'habitaciones:habitacion_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
