services:
  - type: web
    name: hotel-django-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: python manage.py migrate --noinput && gunicorn Hotel.wsgi:application --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: BACKEND_URL
        value: https://your-backend.onrender.com
      - key: FRONTEND_URL
        value: https://your-frontend.onrender.com
      - key: API_URL
        value: https://your-backend.onrender.com
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-backend.onrender.com,https://your-frontend.onrender.com
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "False"
      - key: EMAIL_USE_SSL
        value: "True"
      - key: EMAIL_RETRY_INTERVAL_SECONDS
        value: "300"
      - key: ENABLE_EMAIL_RETRY_WORKER
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_SUBJECT_PREFIX
        value: "[Hotel] "
      - key: LOG_LEVEL
        value: INFO
      - key: TIME_ZONE
        value: UTC
      - key: LANGUAGE_CODE
        value: es-es
      - key: USE_TZ
        value: "True"
      - key: USE_I18N
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-postgres
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SITE_URL
        value: https://your-backend.onrender.com

databases:
  - name: hotel-postgres
    databaseName: hotel_db
    user: hotel_user
